    <h1>Forms</h1>

    <!-- https://www.w3schools.com/html/html_form_attributes.asp -->

    <form>
      <input type="text" placeholder="Enter your name" /> <br />
      <input type="number" /> <br />
      <input type="tel" /> <br />
      <input type="password" /> <br />
      <input type="email" /> <br />
      <input type="age" /> <br />
      <input type="color" /> <br />
      <input type="date" /> <br />
      <input type="time" /> <br />
      <input type="range" /><br />
      <input type="url" /> <br />

      ---

      <input type="radio" id="male" name="gender" />
      <label for="male">male</label>

      <input type="radio" id="female" name="gender" />
      <label for="female">female</label>

      <br />

      <input type="radio" name="education" id="matric" />

      <input type="radio" name="education" id="inter" />
      <label for="inter">inter</label>

      <input type="radio" name="education" id="university" />
      <label for="university">university</label>

      <br /><br />

      hobbies:
      <input type="checkbox" id="boxing" name="hobbies" />
      <label for="boxing">boxing</label>

      <input type="checkbox" id="reading" name="hobbies" />
      <label for="reading">reading</label>

      <input type="checkbox" id="memo" name="hobbies" />
      <label for="memo">memorization of quran</label>

      <input type="checkbox" id="other" name="hobbies" />

      <br /><br />
      <input type="file" accept=".pdf" />
